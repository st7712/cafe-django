<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Přihlášení | U Pole</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .card {
        width: 100%;
        max-width: 400px;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h3 class="text-center mb-4">Vstup pro personál</h3>

      <div id="alertBox" class="alert alert-danger d-none"></div>

      <form id="loginForm">
        <div class="mb-3">
          <label>Uživatelské jméno</label>
          <input type="text" id="username" class="form-control" required />
        </div>
        <div class="mb-3">
          <label>Heslo</label>
          <input type="password" id="password" class="form-control" required />
        </div>
        <button type="submit" class="btn btn-primary w-100"
          >Přihlásit se</button
        >
      </form>

      <hr />
      <button
        onclick="register()"
        class="btn btn-outline-secondary w-100 btn-sm"
        >Vytvořit účet (Registrace)</button
      >
    </div>

    <script>
      async function handleAuth(url, bodyData) {
        const alertBox = document.getElementById("alertBox");
        alertBox.classList.add("d-none");

        try {
          const response = await fetch(url, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(bodyData),
          });

          const data = await response.json();

          if (response.ok) {
            // Uložení cookie na 1 den
            const d = new Date();
            d.setTime(d.getTime() + 24 * 60 * 60 * 1000);
            document.cookie = `auth_token=${data.token};expires=${d.toUTCString()};path=/`;

            // Přesměrování
            window.location.href = "/staff/";
          } else {
            alertBox.innerText = data.error || "Chyba přihlášení";
            alertBox.classList.remove("d-none");
          }
        } catch (error) {
          console.error(error);
        }
      }

      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const u = document.getElementById("username").value;
          const p = document.getElementById("password").value;
          handleAuth("/api/login/", {username: u, password: p});
        });

      function register() {
        const u = document.getElementById("username").value;
        const p = document.getElementById("password").value;
        if (!u || !p) {
          alert("Vyplňte údaje");
          return;
        }
        handleAuth("/api/register/", {username: u, password: p});
      }
    </script>
  </body>
</html>
